<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0f2440"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Decorative circle -->
  <circle cx="420" cy="80" r="120" fill="rgba(255,255,255,0.04)"/>
  <!-- Femur shaft -->
  <line x1="256" y1="72" x2="256" y2="220" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.9"/>
  <!-- Tibia shaft with angular deviation -->
  <line x1="256" y1="292" x2="228" y2="440" stroke="white" stroke-width="16" stroke-linecap="round" opacity="0.9"/>
  <!-- Joint line (knee) -->
  <ellipse cx="256" cy="256" rx="56" ry="14" stroke="white" stroke-width="4" fill="none" opacity="0.4"/>
  <!-- Condyle dots -->
  <circle cx="208" cy="256" r="8" fill="white" opacity="0.6"/>
  <circle cx="304" cy="256" r="8" fill="white" opacity="0.6"/>
  <!-- Mechanical axis (dashed) -->
  <line x1="256" y1="72" x2="256" y2="440" stroke="#f59e0b" stroke-width="3" stroke-dasharray="10 8" opacity="0.45"/>
  <!-- Angle arc -->
  <path d="M 256 292 Q 248 340, 238 370" fill="none" stroke="#f59e0b" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  <!-- Angle indicator -->
  <text x="200" y="355" font-family="Inter, sans-serif" font-size="40" font-weight="700" fill="#fbbf24" opacity="0.9">α</text>
  <!-- Small alignment dots -->
  <circle cx="256" cy="72" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="256" cy="440" r="6" fill="#f59e0b" opacity="0.7"/>
</svg>
